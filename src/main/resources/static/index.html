<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>茶悦时光 - AI智能客服</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary: #8B5E3C;
            --primary-light: #D4A574;
            --primary-dark: #5C3D2E;
            --bg-cream: #FFF8F0;
            --bg-chat: #F5EDE4;
            --accent: #E8985E;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-cream);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .chat-header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .chat-header .logo { display: flex; align-items: center; gap: 12px; }
        .chat-header .logo-icon {
            width: 40px; height: 40px; border-radius: 50%;
            background: var(--accent); display: flex; align-items: center;
            justify-content: center; font-size: 20px;
        }
        .chat-header h1 { font-size: 18px; font-weight: 600; }
        .chat-header .subtitle { font-size: 12px; opacity: 0.8; }

        /* Main Layout */
        .main-container {
            display: flex; flex: 1; overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 280px; background: white; border-right: 1px solid #e8ddd2;
            display: flex; flex-direction: column; overflow-y: auto;
        }
        .sidebar-section { padding: 16px; border-bottom: 1px solid #f0e6db; }
        .sidebar-section h3 {
            font-size: 13px; font-weight: 600; color: var(--primary);
            margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
        }
        .menu-item {
            padding: 8px 12px; margin: 4px 0; border-radius: 8px;
            cursor: pointer; font-size: 13px; transition: all 0.2s;
            display: flex; justify-content: space-between; align-items: center;
        }
        .menu-item:hover { background: var(--bg-cream); }
        .menu-item .price { color: var(--accent); font-weight: 600; font-size: 12px; }
        .quick-btn {
            display: inline-block; padding: 6px 12px; margin: 3px;
            border-radius: 16px; background: var(--bg-cream); border: 1px solid var(--primary-light);
            color: var(--primary); font-size: 12px; cursor: pointer; transition: all 0.2s;
        }
        .quick-btn:hover { background: var(--primary-light); color: white; }

        /* Chat Area */
        .chat-area { flex: 1; display: flex; flex-direction: column; }
        .chat-messages {
            flex: 1; overflow-y: auto; padding: 20px; display: flex;
            flex-direction: column; gap: 16px;
        }
        .message {
            display: flex; gap: 10px; max-width: 80%;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .message .avatar {
            width: 36px; height: 36px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; font-size: 16px;
        }
        .message.bot .avatar { background: var(--primary-light); }
        .message.user .avatar { background: #4A90D9; color: white; }
        .message .bubble {
            padding: 12px 16px; border-radius: 16px;
            line-height: 1.6; font-size: 14px; word-break: break-word;
            white-space: pre-wrap;
        }
        .message.bot .bubble {
            background: white; color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }
        .message.user .bubble {
            background: var(--primary); color: white;
            border-bottom-right-radius: 4px;
        }
        .typing-indicator .bubble {
            display: flex; gap: 4px; align-items: center; padding: 16px 20px;
        }
        .typing-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--primary-light); animation: bounce 1.4s infinite ease-in-out;
        }
        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Input Area */
        .chat-input-area {
            padding: 16px 20px; background: white;
            border-top: 1px solid #e8ddd2;
        }
        .input-wrapper {
            display: flex; gap: 10px; align-items: flex-end;
        }
        .chat-input {
            flex: 1; border: 2px solid #e8ddd2; border-radius: 20px;
            padding: 10px 16px; font-size: 14px; outline: none;
            resize: none; max-height: 100px; min-height: 40px;
            transition: border-color 0.2s; font-family: inherit;
        }
        .chat-input:focus { border-color: var(--primary-light); }
        .send-btn {
            width: 42px; height: 42px; border-radius: 50%;
            background: var(--primary); color: white; border: none;
            cursor: pointer; display: flex; align-items: center;
            justify-content: center; transition: all 0.2s; flex-shrink: 0;
        }
        .send-btn:hover { background: var(--primary-dark); transform: scale(1.05); }
        .send-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }
        .toolbar {
            display: flex; gap: 8px; margin-top: 8px; align-items: center;
        }
        .toolbar button {
            background: none; border: none; color: #999; cursor: pointer;
            font-size: 13px; padding: 4px 8px; border-radius: 4px;
            display: flex; align-items: center; gap: 4px;
        }
        .toolbar button:hover { background: var(--bg-cream); color: var(--primary); }

        /* Admin Panel */
        .admin-panel {
            width: 320px; background: white; border-left: 1px solid #e8ddd2;
            overflow-y: auto; display: none;
        }
        .admin-panel.active { display: block; }
        .admin-section { padding: 16px; border-bottom: 1px solid #f0e6db; }
        .admin-section h4 {
            font-size: 13px; font-weight: 600; color: var(--primary);
            margin-bottom: 10px; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
        }
        .admin-section .content { display: none; }
        .admin-section.open .content { display: block; }
        .admin-input {
            width: 100%; padding: 6px 10px; border: 1px solid #ddd;
            border-radius: 6px; font-size: 12px; margin-bottom: 6px;
        }
        .admin-textarea {
            width: 100%; padding: 8px; border: 1px solid #ddd;
            border-radius: 6px; font-size: 12px; min-height: 80px;
            resize: vertical; font-family: inherit;
        }
        .admin-btn {
            padding: 4px 12px; border-radius: 4px; font-size: 12px;
            cursor: pointer; border: 1px solid var(--primary);
            background: white; color: var(--primary); margin: 2px;
        }
        .admin-btn:hover { background: var(--primary); color: white; }
        .admin-btn.danger { border-color: #dc3545; color: #dc3545; }
        .admin-btn.danger:hover { background: #dc3545; color: white; }
        .skill-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 6px 0; font-size: 12px;
        }
        .knowledge-item {
            padding: 8px; margin: 4px 0; background: var(--bg-cream);
            border-radius: 6px; font-size: 12px;
        }
        .knowledge-item .title { font-weight: 600; color: var(--primary); }
        .knowledge-item .keywords { color: #999; font-size: 11px; margin: 2px 0; }

        /* Agent Reasoning Steps */
        .agent-steps-toggle {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 4px 10px; margin-top: 8px;
            font-size: 11px; color: var(--primary); cursor: pointer;
            background: var(--bg-cream); border-radius: 12px;
            border: 1px solid var(--primary-light); transition: all 0.2s;
        }
        .agent-steps-toggle:hover { background: var(--primary-light); color: white; }
        .agent-steps-container {
            display: none; margin-top: 8px; padding: 10px;
            background: #FEFAF5; border-radius: 10px;
            border: 1px solid #EDE0D4; font-size: 12px;
        }
        .agent-steps-container.open { display: block; }
        .agent-step {
            display: flex; gap: 8px; padding: 6px 0;
            border-bottom: 1px dashed #EDE0D4;
        }
        .agent-step:last-child { border-bottom: none; }
        .agent-step-badge {
            flex-shrink: 0; padding: 2px 8px; border-radius: 10px;
            font-size: 10px; font-weight: 600; color: white;
            display: flex; align-items: center; gap: 3px; height: fit-content;
        }
        .agent-step-badge.THOUGHT { background: #6C8EBF; }
        .agent-step-badge.ACTION { background: #D4A574; }
        .agent-step-badge.OBSERVATION { background: #82B366; }
        .agent-step-badge.FINAL_ANSWER { background: var(--primary); }
        .agent-step-content {
            color: #555; line-height: 1.5; word-break: break-word;
            white-space: pre-wrap;
        }
        .agent-iterations {
            text-align: right; font-size: 10px; color: #aaa;
            margin-top: 4px; padding-top: 4px;
        }

        @media (max-width: 768px) {
            .sidebar, .admin-panel { display: none !important; }
            .message { max-width: 90%; }
        }
    </style>
</head>
<body>

<!-- Header -->
<div class="chat-header">
    <div class="logo">
        <div class="logo-icon">🧋</div>
        <div>
            <h1>茶悦时光</h1>
            <div class="subtitle">AI智能客服小茶为您服务</div>
        </div>
    </div>
    <div>
        <button class="btn btn-sm btn-outline-light" onclick="toggleAdmin()" title="管理面板">
            <i class="bi bi-gear"></i> 管理
        </button>
    </div>
</div>

<div class="main-container">
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-section">
            <h3><i class="bi bi-cup-hot"></i> 饮品菜单</h3>
            <div class="menu-item" onclick="quickOrder('经典珍珠奶茶')">
                <span>🧋 经典珍珠奶茶</span><span class="price">¥12-18</span>
            </div>
            <div class="menu-item" onclick="quickOrder('抹茶拿铁')">
                <span>🍵 抹茶拿铁</span><span class="price">¥14-20</span>
            </div>
            <div class="menu-item" onclick="quickOrder('杨枝甘露')">
                <span>🥭 杨枝甘露</span><span class="price">¥16-22</span>
            </div>
            <div class="menu-item" onclick="quickOrder('芋泥波波奶茶')">
                <span>🟣 芋泥波波奶茶</span><span class="price">¥15-21</span>
            </div>
            <div class="menu-item" onclick="quickOrder('草莓摇摇乐')">
                <span>🍓 草莓摇摇乐</span><span class="price">¥13-19</span>
            </div>
            <div class="menu-item" onclick="quickOrder('桂花乌龙茶')">
                <span>🌼 桂花乌龙茶</span><span class="price">¥10-16</span>
            </div>
            <div class="menu-item" onclick="quickOrder('黑糖鹿丸鲜奶')">
                <span>🤎 黑糖鹿丸鲜奶</span><span class="price">¥14-20</span>
            </div>
            <div class="menu-item" onclick="quickOrder('多肉葡萄')">
                <span>🍇 多肉葡萄</span><span class="price">¥15-21</span>
            </div>
        </div>

        <div class="sidebar-section">
            <h3><i class="bi bi-lightning"></i> 快捷操作</h3>
            <span class="quick-btn" onclick="sendQuick('我想点一杯奶茶')">点单</span>
            <span class="quick-btn" onclick="sendQuick('我想查询我的订单')">查询订单</span>
            <span class="quick-btn" onclick="sendQuick('我想取消订单')">取消订单</span>
            <span class="quick-btn" onclick="sendQuick('有什么推荐的吗？')">推荐</span>
            <span class="quick-btn" onclick="sendQuick('你们有什么配送方式？')">配送</span>
            <span class="quick-btn" onclick="sendQuick('退单政策是怎样的？')">退单政策</span>
        </div>
    </div>

    <!-- Chat Area -->
    <div class="chat-area">
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
            <div class="input-wrapper">
                <textarea class="chat-input" id="chatInput" placeholder="请输入消息..."
                          rows="1" onkeydown="handleKeyDown(event)"></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                    <i class="bi bi-send-fill"></i>
                </button>
            </div>
            <div class="toolbar">
                <button onclick="clearChat()"><i class="bi bi-trash3"></i> 清空对话</button>
                <button onclick="newSession()"><i class="bi bi-plus-circle"></i> 新会话</button>
                <span style="color:#ccc; font-size:12px; margin-left:auto;" id="sessionInfo"></span>
            </div>
        </div>
    </div>

    <!-- Admin Panel -->
    <div class="admin-panel" id="adminPanel">
        <!-- Prompt Management -->
        <div class="admin-section open">
            <h4 onclick="toggleSection(this)">
                <span><i class="bi bi-chat-square-text"></i> 提示词管理</span>
                <i class="bi bi-chevron-down"></i>
            </h4>
            <div class="content" id="promptsPanel">
                <div id="promptsList"></div>
                <hr style="margin:8px 0">
                <input class="admin-input" id="newPromptKey" placeholder="提示词Key">
                <textarea class="admin-textarea" id="newPromptValue" placeholder="提示词模板内容"></textarea>
                <button class="admin-btn" onclick="savePrompt()">保存提示词</button>
            </div>
        </div>

        <!-- Context Management -->
        <div class="admin-section">
            <h4 onclick="toggleSection(this)">
                <span><i class="bi bi-diagram-3"></i> 上下文管理</span>
                <i class="bi bi-chevron-down"></i>
            </h4>
            <div class="content" id="contextPanel">
                <div id="contextInfo"></div>
                <button class="admin-btn" onclick="loadContextInfo()">刷新</button>
            </div>
        </div>

        <!-- Skills Management -->
        <div class="admin-section">
            <h4 onclick="toggleSection(this)">
                <span><i class="bi bi-tools"></i> 技能管理</span>
                <i class="bi bi-chevron-down"></i>
            </h4>
            <div class="content" id="skillsPanel">
                <div id="skillsList"></div>
            </div>
        </div>

        <!-- RAG Management -->
        <div class="admin-section">
            <h4 onclick="toggleSection(this)">
                <span><i class="bi bi-book"></i> RAG知识库</span>
                <i class="bi bi-chevron-down"></i>
            </h4>
            <div class="content" id="ragPanel">
                <div style="margin-bottom:8px">
                    <input class="admin-input" id="ragSearch" placeholder="搜索知识库..."
                           onkeyup="searchRAG()">
                </div>
                <div id="ragList"></div>
                <hr style="margin:8px 0">
                <input class="admin-input" id="ragId" placeholder="知识ID">
                <input class="admin-input" id="ragTitle" placeholder="标题">
                <input class="admin-input" id="ragKeywords" placeholder="关键词(逗号分隔)">
                <textarea class="admin-textarea" id="ragContent" placeholder="知识内容"></textarea>
                <button class="admin-btn" onclick="addKnowledge()">添加知识</button>
            </div>
        </div>
    </div>
</div>

<script>
const API_BASE = window.API_BASE || '';
let sessionId = null;
let isLoading = false;

// Init
document.addEventListener('DOMContentLoaded', () => {
    loadWelcome();
    loadPrompts();
    loadSkills();
    loadRAG();
});

async function loadWelcome() {
    try {
        const res = await fetch(`${API_BASE}/api/chat/welcome`);
        const data = await res.json();
        appendMessage('bot', data.message);
    } catch (e) {
        appendMessage('bot', '欢迎光临茶悦时光！我是智能客服小茶~请问有什么可以帮您的呢？');
    }
}

function appendMessage(type, text, agentSteps, iterations) {
    const container = document.getElementById('chatMessages');
    const div = document.createElement('div');
    div.className = `message ${type}`;

    const avatarText = type === 'bot' ? '🧋' : '👤';
    let stepsHtml = '';

    if (type === 'bot' && agentSteps && agentSteps.length > 0) {
        const stepId = 'steps-' + Date.now();
        const stepIcons = { THOUGHT: '💭', ACTION: '⚡', OBSERVATION: '👁', FINAL_ANSWER: '✅' };
        const stepsContent = agentSteps.map(step => `
            <div class="agent-step">
                <span class="agent-step-badge ${step.type}">${stepIcons[step.type] || '•'} ${escapeHtml(step.label)}</span>
                <span class="agent-step-content">${escapeHtml(step.content)}</span>
            </div>
        `).join('');
        stepsHtml = `
            <div class="agent-steps-toggle" onclick="toggleSteps('${stepId}')">
                <i class="bi bi-diagram-3"></i> 查看推理过程 (${iterations} 轮)
            </div>
            <div class="agent-steps-container" id="${stepId}">
                ${stepsContent}
                <div class="agent-iterations">共 ${agentSteps.length} 步 · ${iterations} 轮推理</div>
            </div>
        `;
    }

    div.innerHTML = `
        <div class="avatar">${avatarText}</div>
        <div>
            <div class="bubble">${escapeHtml(text)}</div>
            ${stepsHtml}
        </div>
    `;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

function toggleSteps(id) {
    const el = document.getElementById(id);
    if (el) el.classList.toggle('open');
}

function showTyping() {
    const container = document.getElementById('chatMessages');
    const div = document.createElement('div');
    div.className = 'message bot typing-indicator';
    div.id = 'typingIndicator';
    div.innerHTML = `
        <div class="avatar">🧋</div>
        <div class="bubble">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
        </div>
    `;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

function hideTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

async function sendMessage() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text || isLoading) return;

    appendMessage('user', text);
    input.value = '';
    input.style.height = 'auto';
    isLoading = true;
    document.getElementById('sendBtn').disabled = true;
    showTyping();

    try {
        const res = await fetch(`${API_BASE}/api/chat/send`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sessionId, message: text })
        });
        const data = await res.json();
        sessionId = data.sessionId;
        document.getElementById('sessionInfo').textContent = `会话: ${sessionId.substring(0, 8)}...`;
        hideTyping();
        appendMessage('bot', data.reply, data.agentSteps, data.iterations);
    } catch (e) {
        hideTyping();
        appendMessage('bot', '抱歉，网络出了点问题，请稍后重试~');
    } finally {
        isLoading = false;
        document.getElementById('sendBtn').disabled = false;
    }
}

function handleKeyDown(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
}

function sendQuick(text) {
    document.getElementById('chatInput').value = text;
    sendMessage();
}

function quickOrder(name) {
    sendQuick(`我想点一杯${name}`);
}

async function clearChat() {
    if (sessionId) {
        try {
            await fetch(`${API_BASE}/api/chat/clear`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sessionId })
            });
        } catch (e) { /* ignore */ }
    }
    document.getElementById('chatMessages').innerHTML = '';
    loadWelcome();
}

function newSession() {
    sessionId = null;
    document.getElementById('chatMessages').innerHTML = '';
    document.getElementById('sessionInfo').textContent = '';
    loadWelcome();
}

// Admin Panel
function toggleAdmin() {
    const panel = document.getElementById('adminPanel');
    panel.classList.toggle('active');
}

function toggleSection(el) {
    el.closest('.admin-section').classList.toggle('open');
}

// Prompt Management
async function loadPrompts() {
    try {
        const res = await fetch(`${API_BASE}/api/admin/prompts`);
        const data = await res.json();
        const list = document.getElementById('promptsList');
        list.innerHTML = Object.entries(data).map(([key, value]) => `
            <div class="knowledge-item">
                <div class="title">${escapeHtml(key)}</div>
                <div style="margin-top:4px;max-height:60px;overflow:hidden;font-size:11px;color:#666">
                    ${escapeHtml(value.substring(0, 100))}${value.length > 100 ? '...' : ''}
                </div>
                <button class="admin-btn danger" style="margin-top:4px" onclick="deletePrompt('${key}')">删除</button>
            </div>
        `).join('');
    } catch (e) { /* ignore */ }
}

async function savePrompt() {
    const key = document.getElementById('newPromptKey').value.trim();
    const template = document.getElementById('newPromptValue').value.trim();
    if (!key || !template) return;
    try {
        await fetch(`${API_BASE}/api/admin/prompts`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ key, template })
        });
        document.getElementById('newPromptKey').value = '';
        document.getElementById('newPromptValue').value = '';
        loadPrompts();
    } catch (e) { /* ignore */ }
}

async function deletePrompt(key) {
    try {
        await fetch(`${API_BASE}/api/admin/prompts/${key}`, { method: 'DELETE' });
        loadPrompts();
    } catch (e) { /* ignore */ }
}

// Context Management
async function loadContextInfo() {
    try {
        const res = await fetch(`${API_BASE}/api/admin/contexts`);
        const data = await res.json();
        document.getElementById('contextInfo').innerHTML = `
            <div class="knowledge-item">
                <div class="title">活跃会话数: ${data.activeSessions}</div>
                <div style="font-size:11px;margin-top:4px;color:#666">
                    ${Array.from(data.sessionIds || []).map(id =>
                        `<div>${id.substring(0, 16)}...
                         <button class="admin-btn danger" onclick="clearSession('${id}')">清除</button></div>`
                    ).join('')}
                </div>
            </div>
        `;
    } catch (e) { /* ignore */ }
}

async function clearSession(sid) {
    try {
        await fetch(`${API_BASE}/api/admin/contexts/${sid}`, { method: 'DELETE' });
        loadContextInfo();
    } catch (e) { /* ignore */ }
}

// Skills Management
async function loadSkills() {
    try {
        const res = await fetch(`${API_BASE}/api/admin/skills`);
        const data = await res.json();
        document.getElementById('skillsList').innerHTML = data.map(skill => `
            <div class="skill-item">
                <div>
                    <strong>${escapeHtml(skill.displayName)}</strong>
                    <div style="font-size:11px;color:#666">${escapeHtml(skill.description)}</div>
                </div>
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" ${skill.enabled ? 'checked' : ''}
                           onchange="toggleSkill('${skill.name}', this.checked)">
                </div>
            </div>
        `).join('');
    } catch (e) { /* ignore */ }
}

async function toggleSkill(name, enabled) {
    try {
        await fetch(`${API_BASE}/api/admin/skills/${name}/toggle`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ enabled })
        });
    } catch (e) { /* ignore */ }
}

// RAG Management
async function loadRAG() {
    try {
        const res = await fetch(`${API_BASE}/api/admin/rag`);
        const data = await res.json();
        renderRAGList(data);
    } catch (e) { /* ignore */ }
}

function renderRAGList(data) {
    document.getElementById('ragList').innerHTML = data.map(entry => `
        <div class="knowledge-item">
            <div class="title">${escapeHtml(entry.title)}</div>
            <div class="keywords">关键词: ${entry.keywords.join(', ')}</div>
            <div style="font-size:11px;color:#666;max-height:40px;overflow:hidden">${escapeHtml(entry.content.substring(0, 80))}...</div>
            <button class="admin-btn danger" style="margin-top:4px" onclick="deleteKnowledge('${entry.id}')">删除</button>
        </div>
    `).join('');
}

async function searchRAG() {
    const query = document.getElementById('ragSearch').value.trim();
    if (!query) { loadRAG(); return; }
    try {
        const res = await fetch(`${API_BASE}/api/admin/rag/search?query=${encodeURIComponent(query)}`);
        const data = await res.json();
        renderRAGList(data);
    } catch (e) { /* ignore */ }
}

async function addKnowledge() {
    const id = document.getElementById('ragId').value.trim();
    const title = document.getElementById('ragTitle').value.trim();
    const keywords = document.getElementById('ragKeywords').value.trim().split(/[,，]/).map(s => s.trim()).filter(Boolean);
    const content = document.getElementById('ragContent').value.trim();
    if (!id || !title || !content) return;
    try {
        await fetch(`${API_BASE}/api/admin/rag`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id, title, keywords, content })
        });
        ['ragId','ragTitle','ragKeywords','ragContent'].forEach(k => document.getElementById(k).value = '');
        loadRAG();
    } catch (e) { /* ignore */ }
}

async function deleteKnowledge(id) {
    try {
        await fetch(`${API_BASE}/api/admin/rag/${id}`, { method: 'DELETE' });
        loadRAG();
    } catch (e) { /* ignore */ }
}

// Auto-resize textarea
document.getElementById('chatInput').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});
</script>
</body>
</html>
