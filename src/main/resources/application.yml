server:
  port: 9000

spring:
  ai:
    openai:
      # 自部署大模型的 API 地址（兼容 OpenAI 格式，如 Ollama / vLLM / LMDeploy 等）
      # Spring AI 会自动在此地址后追加 /v1/chat/completions
      base-url: http://10.155.193.243/api
      # 若自部署服务不需要鉴权，填任意非空字符串即可
      api-key: none
      chat:
        options:
          # 替换为自部署服务对应的模型名称
          model: qwen2.5:7b
          temperature: 0.7

  # Redis (long-term memory persistence)
  # If Redis is unavailable, the system falls back to in-memory storage
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms

  # Static resources
  web:
    resources:
      static-locations: classpath:/static/

# Frontend extension version configuration
# Switch between 'v1' (frontend-extension, MilkTea theme) and 'v2' (frontend-extensionV2, Finance blue theme)
# v1: Original MilkTea order agent frontend (brown theme)
# v2: Financial report volatility analysis frontend (blue theme)
app:
  frontend:
    version: v2
